; Heltec WiFi LoRa 32 V3  (ESP32-S3FN8 + SX1262 + SSD1306 OLED)
;
; Framework is ESP-IDF; FreeRTOS ships *as* the IDF kernel, so there is no
; separate "install FreeRTOS" step.  Multi-core SMP scheduling is on by
; default in IDF 5.x — we just pin tasks to specific cores from main.c.

[env:heltec_wifi_lora_32_V3]
platform     = espressif32
board        = heltec_wifi_lora_32_V3
framework    = espidf

; Heltec V3 exposes the S3's built-in USB-Serial-JTAG over USB-C.
; We route the IDF console there (see sdkconfig.defaults).
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, time

build_flags =
    -Wall
    -Wextra
    -Wno-unused-parameter
