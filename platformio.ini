; Heltec WiFi LoRa 32 V3  (ESP32-S3FN8 + SX1262 + SSD1306 OLED)
;
; Framework is ESP-IDF; FreeRTOS ships *as* the IDF kernel, so there is no
; separate "install FreeRTOS" step.  Multi-core SMP scheduling is on by
; default in IDF 5.x — we just pin tasks to specific cores from main.c.
;
; Roles (mesh behavior bundle):
;   pio run                   -> ROUTER (default env, always-on relay)
;   pio run -e leaf -t upload -> LEAF (sleeps between TX, no forwarding)
;   pio run -e gateway ...    -> GATEWAY (always-on observer, no origination)

[platformio]
default_envs = router

[common]
build_flags =
    -Wall
    -Wextra
    -Wno-unused-parameter

[env:router]
platform     = espressif32
board        = heltec_wifi_lora_32_V3
framework    = espidf

; Heltec V3 exposes the S3's built-in USB-Serial-JTAG over USB-C.
; We route the IDF console there (see sdkconfig.defaults).
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, time

build_flags = ${common.build_flags}

[env:leaf]
extends      = env:router
build_flags  = ${common.build_flags} -DAPP_ROLE=APP_ROLE_LEAF

[env:gateway]
extends      = env:router
build_flags  = ${common.build_flags} -DAPP_ROLE=APP_ROLE_GATEWAY

; CPU light-sleep on top of the chosen role. ROUTER + litesleep is the
; biggest win: continuous RX (~5 mA chip) plus CPU light-sleeping when
; idle drops total system current ~10x. Combine with -DAPP_ROLE=... in
; build_flags for LEAF/GATEWAY variants.
[env:litesleep]
extends      = env:router
build_flags  = ${common.build_flags} -DENABLE_LIGHT_SLEEP=1

; Deep sleep with RTC-timer wake. Application architecture flips: app_main
; becomes a one-shot procedure (boot -> TX one beacon -> brief listen ->
; chip + MCU sleep). LEAF role is implied; ROUTER/GATEWAY don't make sense
; with a sleeping CPU. OLED is intentionally not initialized (would
; otherwise dominate the deep-sleep power budget). Runs ~200 ms active +
; 60 s sleep by default; ~10 µA average current.
[env:deepsleep]
extends      = env:router
build_flags  = ${common.build_flags} -DENABLE_DEEP_SLEEP=1 -DAPP_ROLE=APP_ROLE_LEAF
